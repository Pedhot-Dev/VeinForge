name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: "Welcome! Thanks for opening your first issue here. We'll look into it as soon as possible!"
          pr-message: "Welcome! Thanks for your first pull request. We'll review it shortly!"
