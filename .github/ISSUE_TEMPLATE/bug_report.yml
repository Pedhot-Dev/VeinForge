name: Bug Report
description: File a report to help us improve
title: "[BUG] <title>"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us what you expected to happen
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    id: reproduction-steps
    attributes:
      label: Reproduction Steps
      description: How do we reproduce this?
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: version-info
    attributes:
      label: Version Information
      description: What version of the mod and Minecraft are you using?
      placeholder: |
        - Mod Version: 
        - Minecraft Version: 
        - Forge Version: 
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Please provide relevant logs (e.g. latest.log) via a service like pastebin or as an attachment.
    validations:
      required: false
